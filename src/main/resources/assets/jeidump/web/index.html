</head>

        <h1>JEI Dump</h1>

        <section id="content" class="content">
            <div id="welcome">
                <h2>Loading...</h2>
                <p>Reading <code>data/index.json</code>.</p>

        </section>
    </main>

    <footer class="footer">
        Generated by <a href="https://github.com/Aedial/JEIDump">JEI Dump</a>. Open <code>index.html</code> directly in your browser.
    </footer>

    <script src="data/index.js"></script>
    <script src="assets/app.js"></script>

</html>
